<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Offline — Frontiers3D</title>
<meta name="theme-color" content="#020617" />
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;
    padding:calc(24px + env(safe-area-inset-top,0px)) calc(24px + env(safe-area-inset-right,0px)) calc(24px + env(safe-area-inset-bottom,0px)) calc(24px + env(safe-area-inset-left,0px));
    background:#020617;color:#f1f5f9;
    font-family:'Plus Jakarta Sans','Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    text-align:center;
  }
  .wrap{max-width:30rem}
  .logo{font-weight:800;letter-spacing:.18em;font-size:.85rem;margin-bottom:1.5rem;color:#94a3b8}
  .logo span{background:linear-gradient(90deg,#67e8f9,#818cf8);-webkit-background-clip:text;background-clip:text;color:transparent}
  .badge{width:3.5rem;height:3.5rem;margin:0 auto 1.25rem;display:flex;align-items:center;justify-content:center;border-radius:1rem;background:rgba(37,99,235,.14);border:1px solid rgba(59,130,246,.3)}
  h1{font-size:1.25rem;font-weight:700;margin:0 0 .5rem}
  p{font-size:.9rem;line-height:1.6;color:#94a3b8;margin:0 0 1.5rem}
  ul{text-align:left;margin:0 0 1.5rem;padding:0 0 0 1.1rem;color:#cbd5e1;font-size:.85rem;line-height:1.7}
  button{
    appearance:none;border:1px solid #3b82f6;background:#2563eb;color:#fff;
    border-radius:.6rem;padding:.7rem 1.4rem;font:600 .9rem/1 inherit;cursor:pointer;
    min-height:44px;
  }
  button:hover{background:#1d4ed8}
  .note{margin-top:1rem;font-size:.72rem;color:#64748b}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">FRONTIERS<span>3D</span></div>
    <div class="badge" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Frontiers3D needs a connection for live content. These features require you to be online:</p>
    <ul>
      <li>The live Atlas map</li>
      <li>Matterport 3D presentations</li>
      <li>Explore Together live tours</li>
      <li>Sign in and account actions</li>
    </ul>
    <button type="button" onclick="location.reload()">Retry connection</button>
    <div class="note">Reconnect and tap retry to return to the Atlas.</div>
  </div>
</body>
</html>
